<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>Bettbox Docs - 现代化 Android 代理工具指南</title>
  
  <!-- 网页标签栏图标 -->
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="apple-touch-icon" href="favicon.png">

  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  
  <link rel="stylesheet" href="//gcore.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <link rel="stylesheet" href="//gcore.jsdelivr.net/npm/docsify-darklight-theme@latest/dist/style.min.css">
  
  <style>
  :root {
    --accent: #42b983;
  }

  /* 1. GitHub 挂角基础样式 */
  .github-corner svg {
    fill: var(--accent) !important; /* 默认浅色模式：绿底 */
    color: #fff !important;         /* 默认浅色模式：白猫 */
    transition: all 0.3s ease;
    z-index: 99;
  }

  /* 2. 深色模式下的强制变色 */
  /* 当 body 包含 .dark 类时（由插件自动切换），改变 SVG 颜色 */
  body.dark .github-corner svg {
    fill: #161b22 !important;       /* 深色模式：深黑底（符合 GitHub 原生深色风格） */
    color: var(--accent) !important; /* 深色模式：绿色小猫 */
  }

  /* 鼠标悬停时的动画（可选，增加互动感） */
  .github-corner:hover .octo-arm {
    animation: octocat-wave 560ms ease-in-out;
  }
  @keyframes octocat-wave {
    0%, 100% { transform: rotate(0); }
    20%, 60% { transform: rotate(-25deg); }
    40%, 80% { transform: rotate(10deg); }
  }

  /* 3. 导航栏 (Navbar) 适配（防止挡住挂角） */
  .app-nav {
    margin: 15px 60px 0 0 !important;
    z-index: 100 !important;
  }
</style>
  
</head>
<body>
  <div class="progress-bar" id="progress-bar"></div>
  <div id="app">加载中...</div>

  <script>
    window.$docsify = {
      name: 'Bettbox Docs',
      repo: 'appshubcc/Bettbox',
      basePath: '', 
      loadSidebar: true,
      loadNavbar: true,
      auto2top: true,
      subMaxLevel: 3,

      alias: {
        // 路径映射：确保多语言顶栏/侧栏正确加载
        '/en/_navbar.md': '/en/_navbar.md',
        '/en/_sidebar.md': '/en/_sidebar.md',
        '/en/': '/en/README.md',
        '/_navbar.md': '/_navbar.md',
        '/_sidebar.md': '/_sidebar.md'
      },

      search: {
        maxAge: 86400000,
        paths: 'auto',
        placeholder: { '/en/': 'Search...', '/': '搜索文档...' },
        noData: { '/en/': 'No results!', '/': '未找到结果' }
      },

      darklightTheme: {
        siteFont: 'PT Sans',
        defaultTheme: 'light',
        dark: { accent: '#42b983', background: '#0d1117', textColor: '#c9d1d9' },
        light: { accent: '#42b983', background: '#ffffff', textColor: '#24292f' }
      },

      scrollToTop: {
        auto: true,
        text: '↑',
        right: 20,
        bottom: 20,
        offset: 500
      }
    }

    // 进度条逻辑
    window.onscroll = function() {
      var winScroll = document.body.scrollTop || document.documentElement.scrollTop;
      var height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
      var scrolled = (winScroll / height) * 100;
      var pb = document.getElementById("progress-bar");
      if(pb) pb.style.width = scrolled + "%";
    };
  </script>

  <script src="//gcore.jsdelivr.net/npm/docsify@4"></script>
  <script src="//gcore.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  <script src="//gcore.jsdelivr.net/npm/docsify-darklight-theme@latest/dist/index.min.js"></script>
  <script src="//gcore.jsdelivr.net/npm/docsify-copy-code/dist/docsify-copy-code.min.js"></script>
  <script src="//gcore.jsdelivr.net/npm/docsify-scroll-to-top/dist/docsify-scroll-to-top.min.js"></script>
</body>
</html>
