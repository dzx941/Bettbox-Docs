<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>Bettbox Docs - 现代化 Android 代理工具指南</title>
  
  <!-- 网页标签栏图标 -->
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="apple-touch-icon" href="favicon.png">

  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  
  <link rel="stylesheet" href="//gcore.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <link rel="stylesheet" href="//gcore.jsdelivr.net/npm/docsify-darklight-theme@latest/dist/style.min.css">
  
  <style>
    :root {
      --accent: #42b983;
    }

    /* 1. GitHub 挂角基础样式与动画 */
    .github-corner svg {
      transition: all 0.3s ease;
      z-index: 99;
    }

    .github-corner:hover .octo-arm {
      animation: octocat-wave 560ms ease-in-out;
    }

    @keyframes octocat-wave {
      0%, 100% { transform: rotate(0); }
      20%, 60% { transform: rotate(-25deg); }
      40%, 80% { transform: rotate(10deg); }
    }

    /* 2. 导航栏位置适配 */
    .app-nav {
      margin: 15px 60px 0 0 !important;
      z-index: 100 !important;
    }

    /* 3. 页面顶部进度条 */
    .progress-bar {
      position: fixed;
      top: 0;
      left: 0;
      width: 0%;
      height: 3px;
      background: var(--accent);
      z-index: 999;
    }
  </style>
</head>
<body>
  <div class="progress-bar" id="progress-bar"></div>
  <div id="app">加载中...</div>

  <script>
    window.$docsify = {
      name: 'Bettbox Docs',
      repo: 'appshubcc/Bettbox',
      basePath: '', 
      loadSidebar: true,
      loadNavbar: true,
      auto2top: true,
      subMaxLevel: 3,

      alias: {
        '/en/_navbar.md': '/en/_navbar.md',
        '/en/_sidebar.md': '/en/_sidebar.md',
        '/en/': '/en/README.md',
        '/_navbar.md': '/_navbar.md',
        '/_sidebar.md': '/_sidebar.md'
      },

      search: {
        maxAge: 86400000,
        paths: 'auto',
        placeholder: { '/en/': 'Search...', '/': '搜索文档...' },
        noData: { '/en/': 'No results!', '/': '未找到结果' }
      },

      darklightTheme: {
        siteFont: 'PT Sans',
        defaultTheme: 'light',
        dark: { accent: '#42b983', background: '#0d1117', textColor: '#c9d1d9' },
        light: { accent: '#42b983', background: '#ffffff', textColor: '#24292f' }
      },

      scrollToTop: {
        auto: true,
        text: '↑',
        right: 20,
        bottom: 20,
        offset: 500
      }
    };

    // --- 实时同步逻辑：强制修正 GitHub 挂角颜色 ---
    function applyGithubTheme() {
      const svg = document.querySelector('.github-corner svg');
      if (!svg) return;
      
      const isDark = document.body.classList.contains('dark') || 
                     localStorage.getItem('DARK_LIGHT_THEME') === 'dark';

      if (isDark) {
        svg.style.setProperty('fill', '#161b22', 'important');
        svg.style.setProperty('color', '#42b983', 'important');
      } else {
        svg.style.setProperty('fill', '#42b983', 'important');
        svg.style.setProperty('color', '#ffffff', 'important');
      }
    }

    const observer = new MutationObserver(() => {
      applyGithubTheme();
    });
    observer.observe(document.body, { attributes: true, attributeFilter: ['class'] });

    document.addEventListener('click', () => {
      setTimeout(applyGithubTheme, 50);
      setTimeout(applyGithubTheme, 300);
    });

    document.addEventListener('DOMContentLoaded', applyGithubTheme);
    window.addEventListener('load', applyGithubTheme);

    // --- 进度条逻辑 ---
    window.onscroll = function() {
      var winScroll = document.body.scrollTop || document.documentElement.scrollTop;
      var height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
      var scrolled = (winScroll / height) * 100;
      var pb = document.getElementById("progress-bar");
      if(pb) pb.style.width = scrolled + "%";
    };
  </script>

  <script src="//gcore.jsdelivr.net/npm/docsify@4"></script>
  <script src="//gcore.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  <script src="//gcore.jsdelivr.net/npm/docsify-darklight-theme@latest/dist/index.min.js"></script>
  <script src="//gcore.jsdelivr.net/npm/docsify-copy-code/dist/docsify-copy-code.min.js"></script>
  <script src="//gcore.jsdelivr.net/npm/docsify-scroll-to-top/dist/docsify-scroll-to-top.min.js"></script>
</body>
</html>
